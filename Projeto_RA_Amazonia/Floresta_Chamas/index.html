<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto RA Amazônia - Floresta em Chamas</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <a-scene 
    mindar-image="imageTargetSrc: ./alvoflorestachamas.mind; filterMinCF: 0.001; filterBeta: 10;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true; antialias: true;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="video-floresta" src="Florestachamas.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-plane 
        id="target-video"
        src="#video-floresta" 
        width="1" 
        height="1.77" 
        position="0 0 0.3" 
        rotation="-20 0 0"
        material="shader: flat; side: double; transparent: false; opacity: 1;"
        scale="0.1 0.1 0.1"
        animation__scale="property: scale; from: 0.1 0.1 0.1; to: 2.5 2.5 2.5; dur: 2000; easing: easeOutQuad; startEvents: targetFound">
      </a-plane>

    </a-entity>
  </a-scene>

  <script>
    const entity = document.querySelector('[mindar-image-target]');
    const video = document.querySelector('#video-floresta');
    const aPlane = document.querySelector('#target-video');

    // Garante que o vídeo toque imediatamente ao reconhecer o alvo
    entity.addEventListener("targetFound", event => {
      video.play();
    });

    // Pausa e reseta a escala para o efeito acontecer de novo na próxima vez
    entity.addEventListener("targetLost", event => {
      video.pause();
      aPlane.setAttribute('scale', '0.1 0.1 0.1');
    });
  </script>

</body>
</html>

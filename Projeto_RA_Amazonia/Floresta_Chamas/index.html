<!-- 1. AJUSTE DE ESTABILIDADE NO SCENE -->
<a-scene 
  mindar-image="imageTargetSrc: ./alvoflorestachamas.mind; filterMinCF: 0.001; filterBeta: 10;" 
  color-space="sRGB" 
  renderer="colorManagement: true, physicallyCorrectLights: true" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">
  
  <a-assets>
    <video id="video-floresta" src="Florestachamas.mp4" preload="auto" loop="true" playsinline webkit-playsinline></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <!-- 2. VÍDEO COM INCLINAÇÃO E ANIMAÇÃO DE SURGIMENTO -->
    <a-video 
      src="#video-floresta" 
      width="1" 
      height="1.77" 
      position="0 0 0.1" 
      rotation="-20 0 0"
      animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 1200; easing: easeOutElastic; startEvents: targetFound"
      animation__fade="property: material.opacity; from: 0; to: 1; dur: 800; startEvents: targetFound">
    </a-video>
  </a-entity>
</a-scene>
